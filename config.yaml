# LastZ Automation — Alliance Gifts (includes Battlefield chest)
# Edit thresholds/intervals here; no code changes needed for normal tuning.
# Clicks are full-dynamic: template match centers + window-fraction dismiss.

game:
  process_name: Survival.exe   # Activity Monitor / CrossOver process name

# CrossOver bottle helpers (menu option 3 — Fix Hebrew)
crossover:
  bottle_name: "Last Z"        # ~/Library/Application Support/CrossOver/Bottles/<name>

paths:
  templates_dir: templates/active
  logs_dir: logs

thresholds:
  claim_all: 0.82
  claim_button: 0.72
  orange_icon: 0.82            # Battlefield Gifts chest on wilderness map
  alliance_shield: 0.7
  alliance_gifts: 0.7
  rare_tab: 0.78
  alliance_techs: 0.7
  tech_thumbs_up: 0.78
  tech_hex_active: 0.65
  donate_blue: 0.75
  hq_world_button: 0.7         # HQ mode: World button (leave HQ)
  wilderness_hq_button: 0.7    # Wilderness: Headquarters button (enter HQ)
  drone_gift_chest: 0.58
  drone_claim_btn: 0.55
  drone_collect_btn: 0.55
  trucks_icon: 0.72
  trucks_my_truck_tab: 0.65
  trucks_claim_chest: 0.70
  trucks_slot_plus: 0.70
  trucks_refresh: 0.70
  trucks_go: 0.70
  trucks_details_back: 0.70
  help_button: 0.75
  quit_tips: 0.75              # Tips modal "Exit the game?" text
  quit_cancel: 0.75            # blue Cancel on Quit Tips (not the tiny X)

alliance_techs:
  max_donates: 20              # stop blue Donate loop after this many clicks

# Placing trucks (end of menu 1 / watcher). Set include_trucks_flow: false to skip.
trucks:
  include_trucks_flow: true    # false = leave trucks fully manual
  allow_purple_trucks: false   # true = accept purple; false = refresh for orange
  max_refreshes: 15            # safety cap while hunting orange (ticket refreshes OK)
  open_every_n_runs: 5         # also open every Nth gifts run (even without badge)
                               # badge on left-HUD icon always opens immediately

# Menu 4 — click Alliance Help handshake as soon as it blinks (BR 1/8 only).
help_watcher:
  poll_sec: 0.05               # lower = faster, more CPU
  # bottom-right 1/8 of game window (yf0, yf1, xf0, xf1)
  band: [0.50, 1.0, 0.75, 1.0]

drone_gift:
  min_duration: "08:00:00"     # collect only when Exploration Duration >= this
  # Physical-pixel rects relative to reference capture; scaled at runtime
  timer_crop_offset:           # [dx, dy, w, h] from chest match center
  - -77
  - 8
  - 150
  - 28
  modal_timer_region:          # [x, y, w, h] on Idle Reward modal
  - 1200
  - 730
  - 1200
  - 130

watcher:
  alliance_interval_sec: 180   # seconds between claim runs in menu option 2

coordinates:
  # Empty-map dismiss as fractions of the current game window (w, h)
  dismiss_outside_frac:
  - 0.06
  - 0.28
